<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3550"/>
      <stop offset="100%" stop-color="#0d1d2e"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33d17a"/>
      <stop offset="100%" stop-color="#26a269"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#62a0ea"/>
      <stop offset="100%" stop-color="#3584e4"/>
    </linearGradient>
  </defs>

  <!-- App shell -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Running VM — green, play triangle -->
  <rect x="8" y="8" width="52" height="52" rx="10" fill="url(#green)"/>
  <polygon points="24,22 24,48 50,35" fill="white" opacity="0.95"/>

  <!-- Paused VM — blue, pause bars -->
  <rect x="68" y="8" width="52" height="52" rx="10" fill="url(#blue)"/>
  <rect x="82" y="20" width="11" height="28" rx="3" fill="white" opacity="0.95"/>
  <rect x="99" y="20" width="11" height="28" rx="3" fill="white" opacity="0.95"/>

  <!-- Stopped VM — mid-gray, stop square -->
  <rect x="8" y="68" width="52" height="52" rx="10" fill="#5e5c64"/>
  <rect x="23" y="83" width="22" height="22" rx="3" fill="white" opacity="0.8"/>

  <!-- Off VM — dark, faint square (powered off) -->
  <rect x="68" y="68" width="52" height="52" rx="10" fill="#3d3846"/>
  <rect x="83" y="83" width="22" height="22" rx="3" fill="white" opacity="0.35"/>
</svg>
